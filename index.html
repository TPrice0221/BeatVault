<!DOCTYPE html>
<html>
<head>
  <title>On Beat Game</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    #circle {
      width: 150px;
      height: 150px;
      background: red;
      border-radius: 50%;
      margin: 100px auto;
      transition: transform 0.1s, background 0.1s;
    }

    #circle.pulse {
      transform: scale(1.3);
      background: yellow;
    }

    #circle.hit {
      background: lime;
      transform: scale(1.5);
    }

    #circle.miss {
      background: red;
      transform: scale(0.8);
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Stay On Beat</h1>

<div id="circle"></div>

<button onclick="startGame()">Start</button>

<audio id="beat" src="beat.mp3"></audio>

<script>
let bpm = 167;
let beatInterval = 60000 / bpm;
let lastBeatTime = 0;

let tolerance = 120; // ms window (adjust feel here)

function startGame() {
  let audio = document.getElementById("beat");
  audio.currentTime = 0;
  audio.play();

  setInterval(() => {
    let circle = document.getElementById("circle");

    // Pulse BEFORE beat (anticipation cue)
    circle.classList.add("pulse");

    setTimeout(() => {
      circle.classList.remove("pulse");
    }, 100);

    lastBeatTime = Date.now();
  }, beatInterval);
}

document.addEventListener("click", () => {
  let now = Date.now();
  let diff = Math.abs(now - lastBeatTime);

  let circle = document.getElementById("circle");

  if (diff < tolerance) {
    circle.classList.remove("miss");
    circle.classList.add("hit");

    setTimeout(() => {
      circle.classList.remove("hit");
    }, 150);

  } else {
    circle.classList.remove("hit");
    circle.classList.add("miss");

    setTimeout(() => {
      circle.classList.remove("miss");
    }, 150);
  }
});
</script>

</body>
</html>
