<!DOCTYPE html>
<html>
<head>
  <title>Beat Tap Game</title>
</head>

<body style="text-align:center; font-family:sans-serif; background:#111; color:white;">

  <h1>Tap On Beat 🎧</h1>
  <p>Tap when the screen flashes green</p>

  <button onclick="tap()" style="font-size:24px; padding:20px;">TAP</button>

  <h2 id="score">Score: 0</h2>

  <!-- Sound -->
  <audio id="beat" src="https://www.soundjay.com/button/beep-07.wav"></audio>

  <script>
    let score = 0;
    let beat = false;
    let won = false;

    const audio = document.getElementById("beat");

    // Beat loop
    setInterval(() => {
      beat = true;

      audio.currentTime = 0;
      audio.play();

      document.body.style.background = "#1db954";

      setTimeout(() => {
        beat = false;
        document.body.style.background = "#111";
      }, 300);

    }, 1000);

    function tap() {
      if (beat) {
        score++;
      } else {
        score = Math.max(0, score - 1);
      }

      document.getElementById("score").innerText = "Score: " + score;

      // Win condition
      if (score >= 10 && !won) {
        won = true;
        setTimeout(() => {
          alert("🔥 You unlocked a sound pack!");
        }, 100);
      }
    }
  </script>

</body>
</html>
