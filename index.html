<!DOCTYPE html>
<html>
<head>
  <title>Stay On Beat</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: url('background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      font-family: Arial;
      text-align: center;
      /* REMOVED touch-action + overflow lock */
    }

    #overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      padding-top: 30px;
      position: relative;
    }

    h1 { margin-bottom: 10px; }

    #score, #streak {
      margin: 5px;
      font-size: 18px;
    }

    #feedback {
      position: absolute;
      top: 90px;
      width: 100%;
      font-size: 26px;
      font-weight: bold;
      text-shadow: 0 0 15px white;
      pointer-events: none;
    }

    #target {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      margin: 40px auto;

      border: 3px solid rgba(255,255,255,0.2);
      box-shadow:
        0 0 25px rgba(255,255,255,0.2),
        inset 0 0 20px rgba(255,255,255,0.1);

      transition: all 0.1s ease;
    }

    #target.hit {
      box-shadow: 0 0 60px lime, inset 0 0 25px lime;
    }

    #target.miss {
      box-shadow: 0 0 60px red, inset 0 0 25px red;
    }

    .ball {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.4);
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
      pointer-events: none;
    }

    .ball.missed {
      background: rgba(255,0,0,0.4);
      box-shadow: 0 0 25px red;
    }

    button {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      z-index: 20;
    }

    #flash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(255,0,0,0.2);
      opacity: 0;
      pointer-events: none;
    }

    #flash.active {
      opacity: 1;
      transition: opacity 0.1s;
    }
  </style>
</head>

<body>

<div id="overlay">

  <h1>Stay On Beat</h1>

  <div id="score">Score: 0</div>
  <div id="streak">Streak: 0</div>

  <div id="feedback"></div>

  <div id="target"></div>

</div>

<button onclick="startGame()">Start</button>

<div id="flash"></div>

<audio id="beat" src="beat.mp3"></audio>

<script>
let bpm = 167;
let beatInterval = (60000 / bpm) * 2;

let gameStarted = false;
let score = 0;
let streak = 0;

let balls = [];
let targetY = 0;

let perfectWindow = 30;
let goodWindow = 70;

function startGame() {
  if (gameStarted) return;
  gameStarted = true;

  document.querySelector("button").style.display = "none";

  let target = document.getElementById("target");
  targetY = target.getBoundingClientRect().top;

  let audio = document.getElementById("beat");
  audio.currentTime = 0;
  audio.play();

  spawnLoop();
}

function spawnLoop() {
  spawnBall();
  setTimeout(spawnLoop, beatInterval);
}

function spawnBall() {
  let ball = document.createElement("div");
  ball.classList.add("ball");
  ball.style.top = "-100px";

  document.body.appendChild(ball);

  let startTime = Date.now();
  let duration = beatInterval;

  let obj = { el: ball, hit: false };
  balls.push(obj);

  function animate() {
    let now = Date.now();
    let progress = (now - startTime) / duration;

    let y = progress * targetY;
    ball.style.top = y + "px";

    if (progress >= 1) {
      if (!obj.hit) {
        ball.classList.add("missed");
        punish();
      }

      setTimeout(() => {
        ball.remove();
        balls = balls.filter(b => b !== obj);
      }, 300);

      return;
    }

    requestAnimationFrame(animate);
  }

  animate();
}

function handleInput() {
  if (!balls.length) return;

  let target = document.getElementById("target");
  let feedback = document.getElementById("feedback");

  let best = null;
  let smallestDiff = Infinity;

  balls.forEach(b => {
    let y = b.el.getBoundingClientRect().top;
    let diff = Math.abs(y - targetY);

    if (diff < smallestDiff) {
      smallestDiff = diff;
      best = b;
    }
  });

  if (!best) return;

  target.classList.remove("hit", "miss");

  if (smallestDiff < perfectWindow) {
    score += 100;
    streak++;
    feedback.innerText = "PERFECT 🔥";
    target.classList.add("hit");
    best.hit = true;

  } else if (smallestDiff < goodWindow) {
    score += 50;
    streak++;
    feedback.innerText = "Good 👍";
    target.classList.add("hit");
    best.hit = true;

  } else {
    streak = 0;
    feedback.innerText = randomInsult();
    target.classList.add("miss");
    punish();
  }

  target.style.transform = "scale(1.1)";
  setTimeout(() => target.style.transform = "scale(1)", 100);

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("streak").innerText = "Streak: " + streak;
}

function punish() {
  let flash = document.getElementById("flash");
  flash.classList.add("active");

  setTimeout(() => {
    flash.classList.remove("active");
  }, 100);
}

function randomInsult() {
  let lines = [
    "ahh man",
    "oops",
    "do you even produce?",
    "off beat bro 😭"
  ];
  return lines[Math.floor(Math.random() * lines.length)];
}

document.addEventListener("click", handleInput);
document.addEventListener("touchstart", handleInput);
</script>

</body>
</html>
