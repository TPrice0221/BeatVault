<!DOCTYPE html>
<html>
<head>
  <title>Stay On Beat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      color: white;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
      background: black;
    }

    .bg {
      position: fixed;
      width: 100%;
      height: 150%;
      top: 0;
      left: 0;
      z-index: -2;
      background: url('background.jpg') repeat-y center top;
      background-size: auto 100%;
      animation: bgScroll 30s linear infinite;
    }

    .bgGlow {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
      background: radial-gradient(circle at center, rgba(0,255,255,0.08), transparent 60%);
      animation: glowPulse 4s ease-in-out infinite;
    }

    @keyframes bgScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(-300px); }
    }

    @keyframes glowPulse {
      0%,100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    #overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      position: relative;
      padding-top: 30px;
    }

    #feedback {
      position: absolute;
      top: 140px;
      width: 100%;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 20px white;
    }

    #targetWrapper {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* 🔥 NEW HIT LINE */
    #hitLine {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.4);
      transform: translate(-50%, -50%);
    }

    #target {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.2);
      box-shadow:
        0 0 25px rgba(255,255,255,0.2),
        inset 0 0 20px rgba(255,255,255,0.1);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    #target.pulse {
      transform: scale(1.08);
      box-shadow: 0 0 40px cyan;
    }

    #target.hit {
      box-shadow: 0 0 70px lime, inset 0 0 30px lime;
    }

    #target.miss {
      box-shadow: 0 0 70px red, inset 0 0 30px red;
    }

    .ball {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 25px rgba(255,255,255,0.3);
      pointer-events: none;
    }

    #bottomUI {
      position: fixed;
      bottom: 20px;
      width: 100%;
    }

    button {
      position: fixed;
      bottom: 80px;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      z-index: 20;
    }

    #startBtn { left: 50%; transform: translateX(-50%); }
    #stopBtn { left: 20%; display:none; }
    #restartBtn { right: 20%; display:none; }

    #beatInfo {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      opacity: 0.7;
      text-align: right;
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="bgGlow"></div>

<div id="overlay">
  <h1>Stay On Beat</h1>
  <div id="feedback"></div>
</div>

<div id="targetWrapper">
  <div id="hitLine"></div> <!-- 🔥 ADDED -->
  <div id="target"></div>
</div>

<div id="bottomUI">
  <div id="score">Score: 0</div>
  <div id="streak">Streak: 0</div>
</div>

<button id="startBtn" onclick="startGame()">Start</button>
<button id="stopBtn" onclick="stopGame()">Stop</button>
<button id="restartBtn" onclick="restartGame()">Restart</button>

<div id="beatInfo">
  Beat: "XoXo"<br>
  Producer: CannaprizeBEATS
</div>

<audio id="beat" src="beat.mp3"></audio>

<script>
let bpm = 167;
let beatInterval = (60000 / bpm) * 2;

let gameStarted = false;
let score = 0;
let streak = 0;

let balls = [];
let targetCenter = 0;
let spawnTimeout;
let pulseInterval;

let lastLine = "";

// RANDOM
function getRandomLine(list) {
  let line;
  do {
    line = list[Math.floor(Math.random() * list.length)];
  } while (line === lastLine);
  lastLine = line;
  return line;
}

function randomPerfect() {
  return getRandomLine(["PERFECT 🔥","LOCKED IN 🎯","FLAWLESS 🧊","YOU BUILT DIFFERENT"]);
}

function randomGood() {
  return getRandomLine(["Nice 👍","Good timing 👌","You cooking 👨‍🍳"]);
}

function randomDiss() {
  return getRandomLine(["Grandma got more rhythm 👵","Do you even produce?","Timing left the chat"]);
}

// GAME FLOW
function startGame() {
  if (gameStarted) return;
  gameStarted = true;

  document.getElementById("startBtn").style.display = "none";
  document.getElementById("stopBtn").style.display = "block";
  document.getElementById("restartBtn").style.display = "none";

  let rect = document.getElementById("target").getBoundingClientRect();
  targetCenter = rect.top + rect.height / 2;

  let audio = document.getElementById("beat");
  audio.currentTime = 0;
  audio.play();

  startPulse();
  spawnLoop();
}

function stopGame() {
  gameStarted = false;
  clearTimeout(spawnTimeout);
  clearInterval(pulseInterval);

  document.getElementById("beat").pause();

  balls.forEach(b => b.el.remove());
  balls = [];

  document.getElementById("startBtn").style.display = "block";
  document.getElementById("stopBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";

  document.getElementById("feedback").innerText = "Stopped ⏹";
}

function restartGame() {
  score = 0;
  streak = 0;

  document.getElementById("feedback").innerText = "";
  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("streak").innerText = "Streak: 0";

  startGame();
}

// PULSE
function startPulse() {
  let target = document.getElementById("target");

  pulseInterval = setInterval(() => {
    target.classList.add("pulse");
    setTimeout(() => target.classList.remove("pulse"), 120);
  }, beatInterval);
}

// SPAWN
function spawnLoop() {
  if (!gameStarted) return;
  spawnBall();
  spawnTimeout = setTimeout(spawnLoop, beatInterval);
}

function spawnBall() {
  let ball = document.createElement("div");
  ball.classList.add("ball");
  ball.style.top = "-200px";
  document.body.appendChild(ball);

  let start = Date.now();
  let obj = { el: ball, hit: false };
  balls.push(obj);

  function animate() {
    let progress = (Date.now() - start) / beatInterval;
    let endY = targetCenter - 90;
    ball.style.top = (progress * (endY + 200)) + "px";

    if (progress > 1.3) {
      if (!obj.hit) {
        streak = 0;
        document.getElementById("feedback").innerText = "MISS!";
        document.body.style.background = "#220000";
        setTimeout(() => document.body.style.background = "black", 100);

        let target = document.getElementById("target");
        target.classList.add("miss");

        setTimeout(() => target.classList.remove("miss"), 200);
      }

      ball.remove();
      balls = balls.filter(b => b !== obj);
      return;
    }

    requestAnimationFrame(animate);
  }

  animate();
}

// INPUT
function handleInput() {
  if (!balls.length) return;

  let target = document.getElementById("target");
  let feedback = document.getElementById("feedback");

  target.classList.remove("hit","miss");

  let best = null, smallest = Infinity;

  balls.forEach(b => {
    if (b.hit) return;
    let rect = b.el.getBoundingClientRect();
    let center = rect.top + rect.height/2;
    let diff = Math.abs(center - targetCenter);
    if (diff < smallest) {
      smallest = diff;
      best = b;
    }
  });

  if (!best) return;

  let rect = best.el.getBoundingClientRect();
  let center = rect.top + rect.height/2;
  let diff = Math.abs(center - targetCenter);

  if (diff < 25) {
    score+=100; streak++;
    feedback.innerText = randomPerfect();
    target.classList.add("hit");

  } else if (diff < 60) {
    score+=50; streak++;
    feedback.innerText = randomGood();
    target.classList.add("hit");

  } else {
    streak=0;
    feedback.innerText = "MISS!";
    document.body.style.background = "#220000";
    setTimeout(() => document.body.style.background = "black", 100);
    target.classList.add("miss");
  }

  best.hit = true;

  // 🔥 SCORE POP
  let scoreEl = document.getElementById("score");
  scoreEl.style.transform = "scale(1.2)";
  setTimeout(() => scoreEl.style.transform = "scale(1)", 100);

  setTimeout(() => {
    target.classList.remove("hit","miss");
  }, 150);

  target.style.transform = "scale(1.1)";
  setTimeout(()=>target.style.transform="scale(1)",100);

  document.getElementById("score").innerText="Score: "+score;
  document.getElementById("streak").innerText="Streak: "+streak;
}

document.addEventListener("pointerdown", handleInput);

document.getElementById("beat").onended = () => {
  stopGame();
  document.getElementById("feedback").innerText = "Beat Finished, You rock! 🎵";
};
</script>

</body>
</html>
