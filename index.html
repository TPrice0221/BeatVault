<!DOCTYPE html>
<html>
<head>
  <title>On Beat Game</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    #circle {
      width: 150px;
      height: 150px;
      background: red;
      border-radius: 50%;
      margin: 60px auto;
      transition: transform 0.1s, background 0.1s;
    }

    #circle.pulse {
      transform: scale(1.3);
      background: yellow;
    }

    #circle.hit {
      background: lime;
      transform: scale(1.5);
    }

    #circle.miss {
      background: red;
      transform: scale(0.8);
    }

    #barContainer {
      width: 80%;
      height: 10px;
      background: #222;
      margin: 20px auto;
      border-radius: 5px;
      overflow: hidden;
    }

    #bar {
      width: 0%;
      height: 100%;
      background: cyan;
    }

    #score, #streak, #feedback {
      font-size: 20px;
      margin-top: 10px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Stay On Beat</h1>

<div id="circle"></div>

<div id="barContainer">
  <div id="bar"></div>
</div>

<div id="score">Score: 0</div>
<div id="streak">Streak: 0</div>
<div id="feedback">...</div>

<button onclick="startGame()">Start</button>

<audio id="beat" src="beat.mp3"></audio>

<script>
let bpm = 167;
let beatInterval = 60000 / bpm;

let lastBeatTime = 0;
let score = 0;
let streak = 0;

let perfectWindow = 60;
let goodWindow = 130;

function startGame() {
  let audio = document.getElementById("beat");
  audio.currentTime = 0;
  audio.play();

  setInterval(() => {
    let circle = document.getElementById("circle");

    circle.classList.add("pulse");

    setTimeout(() => {
      circle.classList.remove("pulse");
    }, 100);

    lastBeatTime = Date.now();
  }, beatInterval);

  // Progress bar animation
  setInterval(() => {
    let now = Date.now();
    let progress = (now - lastBeatTime) / beatInterval;
    document.getElementById("bar").style.width = (progress * 100) + "%";
  }, 16);
}

document.addEventListener("click", () => {
  let now = Date.now();
  let diff = Math.abs(now - lastBeatTime);

  let circle = document.getElementById("circle");
  let feedback = document.getElementById("feedback");

  if (diff < perfectWindow) {
    score += 100;
    streak += 1;
    feedback.innerText = "Perfect";

    circle.classList.add("hit");
    setTimeout(() => circle.classList.remove("hit"), 150);

  } else if (diff < goodWindow) {
    score += 50;
    streak += 1;
    feedback.innerText = "Good";

    circle.classList.add("hit");
    setTimeout(() => circle.classList.remove("hit"), 150);

  } else {
    streak = 0;
    feedback.innerText = "Miss";

    circle.classList.add("miss");
    setTimeout(() => circle.classList.remove("miss"), 150);
  }

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("streak").innerText = "Streak: " + streak;
});
</script>

</body>
</html>
