<!DOCTYPE html>
<html>
<head>
  <title>Stay On Beat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: url('background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      position: relative;
      padding-top: 30px;
    }

    #feedback {
      position: absolute;
      top: 140px;
      width: 100%;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 20px white;
    }

    #targetWrapper {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #target {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.2);
      box-shadow:
        0 0 25px rgba(255,255,255,0.2),
        inset 0 0 20px rgba(255,255,255,0.1);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    #target.hit {
      box-shadow: 0 0 70px lime, inset 0 0 30px lime;
    }

    #target.miss {
      box-shadow: 0 0 70px red, inset 0 0 30px red;
    }

    .ball {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 25px rgba(255,255,255,0.3);
      pointer-events: none;
    }

    .ball.missed {
      border: 2px solid red;
      box-shadow: 0 0 40px red;
    }

    #bottomUI {
      position: fixed;
      bottom: 20px;
      width: 100%;
    }

    button {
      position: fixed;
      bottom: 80px;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      z-index: 20;
    }

    #startBtn { left: 50%; transform: translateX(-50%); }
    #stopBtn { left: 20%; display:none; }
    #restartBtn { right: 20%; display:none; }

    #beatInfo {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      opacity: 0.7;
      text-align: right;
    }
  </style>
</head>

<body>

<div id="overlay">
  <h1>Stay On Beat</h1>
  <div id="feedback"></div>
</div>

<div id="targetWrapper">
  <div id="target"></div>
</div>

<div id="bottomUI">
  <div id="score">Score: 0</div>
  <div id="streak">Streak: 0</div>
</div>

<button id="startBtn" onclick="startGame()">Start</button>
<button id="stopBtn" onclick="stopGame()">Stop</button>
<button id="restartBtn" onclick="restartGame()">Restart</button>

<div id="beatInfo">
  Beat: "XoXo"<br>
  Producer: CannaprizeBEATS
</div>

<audio id="beat" src="beat.mp3"></audio>

<script>
let bpm = 167;
let beatInterval = (60000 / bpm) * 2;

let gameStarted = false;
let score = 0;
let streak = 0;

let balls = [];
let targetCenter = 0;
let spawnTimeout;

let lastLine = "";

// -------- RANDOM (NO REPEATS)
function getRandomLine(list) {
  let line;
  do {
    line = list[Math.floor(Math.random() * list.length)];
  } while (line === lastLine);
  lastLine = line;
  return line;
}

function randomPerfect() {
  return getRandomLine([
    "PERFECT 🔥","NAILED IT 💎","LOCKED IN 🎯",
    "RIGHT ON TIME ⏱️","CLEAN 🔥","IN THE POCKET 😮‍🔥",
    "FLAWLESS 🧊","THAT'S MUSIC 😤","ZERO LATENCY 🧠",
    "YOU BUILT DIFFERENT"
  ]);
}

function randomGood() {
  return getRandomLine([
    "Nice 👍","Good timing 👌","You cooking 👨‍🍳",
    "Keep it going 🔥","Almost perfect 👀",
    "Solid hit 💪","You feeling it now",
    "That was smooth","Okay okay 👀",
    "We getting there 😏"
  ]);
}

function randomDiss() {
  return getRandomLine([
    "Grandma got more rhythm 👵",
    "For real? 😐",
    "Do you even produce?",
    "Off beat like crazy 😭",
    "Bro... what was that?",
    "You just guessing now?",
    "Beat said left, you went right",
    "Timing left the chat",
    "That hurt to watch",
    "You fighting the beat at this point"
  ]);
}

// -------- GAME FLOW
function startGame() {
  if (gameStarted) return;
  gameStarted = true;

  document.getElementById("startBtn").style.display = "none";
  document.getElementById("stopBtn").style.display = "block";
  document.getElementById("restartBtn").style.display = "none";

  let target = document.getElementById("target");
  let rect = target.getBoundingClientRect();
  targetCenter = rect.top + rect.height / 2;

  let audio = document.getElementById("beat");
  audio.currentTime = 0;
  audio.play();
  audio.onended = endGame;

  spawnLoop();
}

function stopGame() {
  gameStarted = false;
  clearTimeout(spawnTimeout);
  document.getElementById("beat").pause();

  balls.forEach(b => b.el.remove());
  balls = [];

  document.getElementById("startBtn").style.display = "block";
  document.getElementById("stopBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";

  document.getElementById("feedback").innerText = "Stopped ⏹";
}

function restartGame() {
  score = 0;
  streak = 0;
  updateUI();
  document.getElementById("feedback").innerText = "";
  startGame();
}

function endGame() {
  gameStarted = false;
  clearTimeout(spawnTimeout);

  balls.forEach(b => b.el.remove());
  balls = [];

  document.getElementById("startBtn").style.display = "block";
  document.getElementById("stopBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";

  document.getElementById("feedback").innerText = "Song Finished 🎵";
}

// -------- SPAWN
function spawnLoop() {
  if (!gameStarted) return;
  spawnBall();
  spawnTimeout = setTimeout(spawnLoop, beatInterval);
}

function spawnBall() {
  let ball = document.createElement("div");
  ball.classList.add("ball");
  ball.style.top = "-200px";
  document.body.appendChild(ball);

  let startTime = Date.now();
  let duration = beatInterval;

  let obj = { el: ball, hit: false };
  balls.push(obj);

  function animate() {
    let now = Date.now();
    let progress = (now - startTime) / duration;

    let endY = targetCenter - (ball.offsetHeight / 2);
    let y = progress * (endY + 200);
    ball.style.top = y + "px";

    let rect = ball.getBoundingClientRect();
    let center = rect.top + rect.height / 2;

    if (!obj.hit && center > targetCenter + 80) {
      obj.hit = true;
      ball.classList.add("missed");
      streak = 0;
      updateUI();
    }

    if (progress >= 1.3) {
      ball.remove();
      balls = balls.filter(b => b !== obj);
      return;
    }

    requestAnimationFrame(animate);
  }

  animate();
}

// -------- INPUT (ONLY PLACE FEEDBACK HAPPENS)
function handleInput() {
  if (!balls.length) return;

  let target = document.getElementById("target");
  let feedback = document.getElementById("feedback");

  let best = balls[0];

  let rect = best.el.getBoundingClientRect();
  let center = rect.top + rect.height / 2;
  let diff = Math.abs(center - targetCenter);

  if (best.hit) return;

  target.classList.remove("hit", "miss");

  if (diff < 30) {
    score += 100;
    streak++;
    feedback.innerText = randomPerfect();
    target.classList.add("hit");

  } else if (diff < 70) {
    score += 50;
    streak++;
    feedback.innerText = randomGood();
    target.classList.add("hit");

  } else {
    streak = 0;
    feedback.innerText = randomDiss();
    target.classList.add("miss");
  }

  best.hit = true;

  target.style.transform = "scale(1.1)";
  setTimeout(() => target.style.transform = "scale(1)", 100);

  updateUI();
}

function updateUI() {
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("streak").innerText = "Streak: " + streak;
}

document.addEventListener("pointerdown", handleInput);
</script>

</body>
</html>
