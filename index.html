<!DOCTYPE html>
<html>
<head>
  <title>Stay On Beat</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    body {
      margin: 0;
      background: url('background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
      touch-action: manipulation;
    }

    #overlay {
      background: rgba(0,0,0,0.6);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 30px;
      position: relative;
    }

    h1 {
      margin-bottom: 10px;
    }

    #score, #streak, #feedback {
      margin: 5px;
      font-size: 18px;
    }

    /* BIG CENTER TARGET */
    #target {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      margin-top: 40px;
      position: relative;

      border: 3px solid rgba(255,255,255,0.2);
      box-shadow: 0 0 25px rgba(255,255,255,0.2),
                  inset 0 0 20px rgba(255,255,255,0.1);
    }

    #target.hit {
      box-shadow: 0 0 40px lime;
    }

    #target.miss {
      box-shadow: 0 0 40px red;
    }

    /* FALLING BALL */
    .ball {
      width: 40px;
      height: 40px;
      background: white;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    button {
      margin-top: 30px;
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<div id="overlay">

  <h1>Stay On Beat</h1>

  <div id="score">Score: 0</div>
  <div id="streak">Streak: 0</div>
  <div id="feedback">...</div>

  <div id="target"></div>

  <button onclick="startGame()">Start</button>

</div>

<audio id="beat" src="beat.mp3"></audio>

<script>
let bpm = 167;
let beatInterval = (60000 / bpm) * 2;

let gameStarted = false;
let score = 0;
let streak = 0;

let currentBall = null;
let target = null;
let targetY = 0;

let perfectWindow = 50;
let goodWindow = 100;

function startGame() {
  if (gameStarted) return;
  gameStarted = true;

  target = document.getElementById("target");
  targetY = target.getBoundingClientRect().top;

  let audio = document.getElementById("beat");
  audio.currentTime = 0;
  audio.play();

  spawnLoop();
}

function spawnLoop() {
  spawnBall();
  setTimeout(spawnLoop, beatInterval);
}

function spawnBall() {
  let ball = document.createElement("div");
  ball.classList.add("ball");
  ball.style.top = "-50px";

  document.body.appendChild(ball);
  currentBall = ball;

  let startTime = Date.now();
  let duration = beatInterval;

  function animate() {
    let now = Date.now();
    let progress = (now - startTime) / duration;

    if (progress >= 1) {
      ball.style.top = targetY + "px";
      return;
    }

    let y = progress * targetY;
    ball.style.top = y + "px";

    requestAnimationFrame(animate);
  }

  animate();
}

function handleInput() {
  if (!currentBall) return;

  let ballY = currentBall.getBoundingClientRect().top;
  let diff = Math.abs(ballY - targetY);

  let feedback = document.getElementById("feedback");

  target.classList.remove("hit", "miss");

  if (diff < perfectWindow) {
    score += 100;
    streak += 1;
    feedback.innerText = "Perfect";
    target.classList.add("hit");

  } else if (diff < goodWindow) {
    score += 50;
    streak += 1;
    feedback.innerText = "Good";
    target.classList.add("hit");

  } else {
    streak = 0;
    feedback.innerText = "Miss";
    target.classList.add("miss");
  }

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("streak").innerText = "Streak: " + streak;

  setTimeout(() => {
    target.classList.remove("hit", "miss");
    currentBall?.remove();
    currentBall = null;
  }, 150);
}

document.addEventListener("click", handleInput);
document.addEventListener("touchstart", handleInput);
</script>

</body>
</html>
