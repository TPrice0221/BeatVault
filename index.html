<!DOCTYPE html>
<html>
<head>
  <title>Stay On Beat</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    body {
      background: url('background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
      font-family: Arial;
      touch-action: manipulation;
      overflow: hidden;
    }

    #overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      position: relative;
    }

    /* TARGET ZONE */
    #target {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);

      border: 3px solid rgba(255,255,255,0.2);
      box-shadow: 0 0 25px rgba(255,255,255,0.2);
    }

    /* FALLING BALL */
    .ball {
      width: 40px;
      height: 40px;
      background: white;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    #score, #streak, #feedback {
      position: relative;
      z-index: 10;
      font-size: 20px;
      margin-top: 10px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<div id="overlay">

  <h1>Stay On Beat</h1>

  <div id="target"></div>

  <div id="score">Score: 0</div>
  <div id="streak">Streak: 0</div>
  <div id="feedback">...</div>

  <button onclick="startGame()">Start</button>

</div>

<audio id="beat" src="beat.mp3"></audio>

<script>
let bpm = 167;
let beatInterval = (60000 / bpm) * 2;

let gameStarted = false;
let score = 0;
let streak = 0;

let currentBall = null;
let targetY = window.innerHeight - 200;

let perfectWindow = 80;
let goodWindow = 150;

function startGame() {
  if (gameStarted) return;
  gameStarted = true;

  let audio = document.getElementById("beat");
  audio.currentTime = 0;
  audio.play();

  spawnLoop();
}

function spawnLoop() {
  spawnBall();
  setTimeout(spawnLoop, beatInterval);
}

function spawnBall() {
  let ball = document.createElement("div");
  ball.classList.add("ball");
  ball.style.top = "-50px";

  document.body.appendChild(ball);
  currentBall = ball;

  let startTime = Date.now();
  let duration = beatInterval;

  function animate() {
    let now = Date.now();
    let progress = (now - startTime) / duration;

    if (progress >= 1) {
      ball.style.top = targetY + "px";
      return;
    }

    let y = progress * targetY;
    ball.style.top = y + "px";

    requestAnimationFrame(animate);
  }

  animate();
}

function handleInput() {
  if (!currentBall) return;

  let ballY = currentBall.getBoundingClientRect().top;
  let diff = Math.abs(ballY - targetY);

  let feedback = document.getElementById("feedback");

  if (diff < perfectWindow) {
    score += 100;
    streak += 1;
    feedback.innerText = "Perfect";
    currentBall.style.background = "lime";

  } else if (diff < goodWindow) {
    score += 50;
    streak += 1;
    feedback.innerText = "Good";
    currentBall.style.background = "yellow";

  } else {
    streak = 0;
    feedback.innerText = "Miss";
    currentBall.style.background = "red";
  }

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("streak").innerText = "Streak: " + streak;

  setTimeout(() => {
    currentBall?.remove();
    currentBall = null;
  }, 100);
}

document.addEventListener("click", handleInput);
document.addEventListener("touchstart", handleInput);
</script>

</body>
</html>
