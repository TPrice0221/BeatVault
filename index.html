<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beat Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* BACKGROUND */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -3;
}

/* DARK OVERLAY (this fixes EVERYTHING visually) */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  z-index: -2;
}

/* UI */
#ui {
  position: absolute;
  top: 20px;
  left: 20px;
  color: white;
  z-index: 2;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: rgba(0,0,0,0.7);
  color: white;
  border-radius: 6px;
}

/* CIRCLE (main focus now) */
#circle {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 130px;
  height: 130px;
  background: white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 3;
  box-shadow: 0 0 25px rgba(255,255,255,0.5);
  transition: all 0.15s;
}

/* LEADERBOARD */
#leaderboard {
  position: absolute;
  right: 20px;
  top: 20px;
  color: white;
  background: rgba(0,0,0,0.7);
  padding: 12px;
  border-radius: 8px;
  z-index: 2;
}
</style>
</head>

<body>

<img id="bg" src="bg.jpg">
<div id="overlay"></div>

<div id="circle"></div>

<div id="ui">
  <button onclick="startGame()">Start</button>
  <button onclick="stopGame()">Stop</button>
  <button onclick="restartGame()">Restart</button>

  <div>Score: <span id="score">0</span></div>
  <div>Beat: "XoXo"</div>
  <div>Producer: CannaprizeBEATS</div>
</div>

<div id="leaderboard">Loading...</div>

<audio id="audio" src="beat.mp3"></audio>

<script>
let audio = document.getElementById("audio");
let circle = document.getElementById("circle");

let bpm = 167;
let beatInterval = 60000 / bpm;

let score = 0;
let lastBeatTime = 0;
let gameRunning = false;

function startGame() {
  audio.currentTime = 0;
  audio.play();
  score = 0;
  updateScore();
  gameRunning = true;
  beatLoop();
}

function stopGame() {
  audio.pause();
  gameRunning = false;
}

function restartGame() {
  stopGame();
  startGame();
}

function updateScore() {
  document.getElementById("score").innerText = score;
}

function beatLoop() {
  if (!gameRunning) return;

  lastBeatTime = Date.now();

  circle.style.transform = "translate(-50%, -50%) scale(1.2)";
  setTimeout(() => {
    circle.style.transform = "translate(-50%, -50%) scale(1)";
  }, 120);

  setTimeout(beatLoop, beatInterval);
}

window.addEventListener("click", () => {
  if (!gameRunning) return;

  let diff = Math.abs(Date.now() - lastBeatTime);

  if (diff < 120) {
    score++;
    circle.style.boxShadow = "0 0 35px lime";
  } else {
    score--;
    circle.style.boxShadow = "0 0 35px red";
  }

  updateScore();

  setTimeout(() => {
    circle.style.boxShadow = "0 0 25px rgba(255,255,255,0.5)";
  }, 150);
});

audio.onended = () => {
  gameRunning = false;
  endGame();
};

function endGame() {
  let name = prompt("Enter your name:");
  if (!name) name = "Unknown Producer";
  saveScore(name, score);
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyCRfUu0o-FhFgKKPMicjJv9KAb0ivRyciw",
  authDomain: "beat-vault-56c5c.firebaseapp.com",
  projectId: "beat-vault-56c5c",
  storageBucket: "beat-vault-56c5c.firebasestorage.app",
  messagingSenderId: "866079824481",
  appId: "1:866079824481:web:d62546d49884926db92820",
  measurementId: "G-5X09NFW6FQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveScore = async function(name, score) {
  await addDoc(collection(db, "scores"), {
    name,
    score,
    time: Date.now()
  });
  loadLeaderboard();
};

window.loadLeaderboard = async function() {
  const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(10));
  const snapshot = await getDocs(q);

  const board = document.getElementById("leaderboard");
  board.innerHTML = "<b>Leaderboard</b><br>";

  snapshot.forEach(doc => {
    let data = doc.data();
    board.innerHTML += `${data.name}: ${data.score}<br>`;
  });
};

loadLeaderboard();
</script>

</body>
</html>
