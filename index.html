<!DOCTYPE html>
<html>
<head>
  <title>Beat Tap Game</title>
</head>

<body style="text-align:center; font-family:sans-serif; background:#111; color:white; transition:0.15s;">

  <h1>Tap On Beat 🎧</h1>
  <p>Stay locked in</p>

  <button onclick="tap()" style="font-size:24px; padding:20px;">TAP</button>

  <h2 id="score">Score: 0</h2>
  <h3 id="streak">Streak: 0</h3>

  <!-- Popup -->
  <div id="popup" style="
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    background:#222;
    padding:30px;
    border-radius:10px;
  ">
    <h2>🔥 You unlocked a sound pack!</h2>
    <button onclick="closePopup()">Claim</button>
  </div>

  <audio id="beat" src="beat.mp3" loop></audio>

<script>
  let score = 0;
  let streak = 0;
  let beat = false;
  let started = false;
  let won = false;
  let flashing = false;

  const audio = document.getElementById("beat");

  let bpm = 167;
  let interval = (60000 / bpm) * 2;

  function startGame() {
    audio.currentTime = 0;
    audio.play().catch(() => {});

    setInterval(() => {
      beat = true;

      setTimeout(() => {
        beat = false;
      }, 160);

    }, interval);
  }

  function tap() {

    if (!started) {
      started = true;
      setTimeout(startGame, 80);
    }

    if (beat) {
      score++;
      streak++;
      flash("#00ff88");
    } else {
      score = Math.max(0, score - 1);
      streak = 0;
      flash("#ff4444");
    }

    document.getElementById("score").innerText = "Score: " + score;
    document.getElementById("streak").innerText = "Streak: " + streak;

    if (score >= 15 && !won) {
      won = true;
      document.getElementById("popup").style.display = "block";
    }
  }

  function flash(color) {

    // prevent overlapping flashes
    if (flashing) return;

    flashing = true;
    document.body.style.background = color;

    setTimeout(() => {
      document.body.style.background = "#111";
      flashing = false;
    }, 120);
  }

  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }
</script>

</body>
</html>
