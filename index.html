<!DOCTYPE html>
<html>
<head>
  <title>On Beat Game</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    #circle {
      width: 150px;
      height: 150px;
      background: #111;
      border-radius: 50%;
      margin: 120px auto;
      position: relative;
    }

    /* Expanding glow */
    .wave {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      opacity: 0.8;
      pointer-events: none;
    }

    .wave.animate {
      animation: expand 0.36s linear;
    }

    @keyframes expand {
      0% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0.8;
      }
      100% {
        transform: translate(-50%, -50%) scale(2.5);
        opacity: 0;
      }
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Stay On Beat</h1>

<div id="circle"></div>

<button onclick="startGame()">Start</button>

<audio id="beat" src="beat.mp3"></audio>

<script>
let bpm = 167;
let beatInterval = 60000 / bpm;

let lastBeatTime = 0;
let gameStarted = false;

let perfectWindow = 80;

function startGame() {
  if (gameStarted) return; // STOP MULTIPLE STARTS
  gameStarted = true;

  let audio = document.getElementById("beat");
  audio.currentTime = 0;
  audio.play();

  runBeatLoop();
}

function runBeatLoop() {
  let now = Date.now();
  lastBeatTime = now;

  spawnWave("white"); // neutral beat pulse

  setTimeout(runBeatLoop, beatInterval);
}

function spawnWave(color) {
  let circle = document.getElementById("circle");

  let wave = document.createElement("div");
  wave.classList.add("wave", "animate");
  wave.style.border = "3px solid " + color;

  circle.appendChild(wave);

  setTimeout(() => {
    wave.remove();
  }, 400);
}

document.addEventListener("click", () => {
  if (!gameStarted) return;

  let now = Date.now();
  let diff = Math.abs(now - lastBeatTime);

  if (diff < perfectWindow) {
    spawnWave("lime"); // ON BEAT
  } else {
    spawnWave("red"); // OFF BEAT
  }
});
</script>

</body>
</html>
