<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beat Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* Background (clean, no weird dimming) */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: -1;
}

/* Circle */
#circle {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 120px;
  height: 120px;
  background: white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 20px rgba(255,255,255,0.4);
  transition: transform 0.1s, box-shadow 0.1s;
}

/* UI */
#ui {
  position: absolute;
  top: 20px;
  left: 20px;
  color: white;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  border-radius: 6px;
}
</style>
</head>

<body>

<img id="background" src="background.jpg">

<div id="circle"></div>

<div id="ui">
  <button onclick="startGame()">Start</button>
  <button onclick="stopGame()">Stop</button>
  <button onclick="restartGame()">Restart</button>

  <div>Score: <span id="score">0</span></div>
  <div>Beat: "XoXo"</div>
  <div>Producer: CannaprizeBEATS</div>
</div>

<audio id="audio" src="beat.mp3"></audio>

<script>
let audio = document.getElementById("audio");
let circle = document.getElementById("circle");

let bpm = 167;
let beatInterval = 60000 / bpm;

let score = 0;
let lastBeatTime = 0;
let gameRunning = false;

/* START */
function startGame() {
  audio.currentTime = 0;
  audio.play();
  score = 0;
  updateScore();
  gameRunning = true;
  beatLoop();
}

/* STOP */
function stopGame() {
  audio.pause();
  gameRunning = false;
}

/* RESTART */
function restartGame() {
  stopGame();
  startGame();
}

/* SCORE */
function updateScore() {
  document.getElementById("score").innerText = score;
}

/* BEAT LOOP */
function beatLoop() {
  if (!gameRunning) return;

  lastBeatTime = Date.now();

  // Pulse animation
  circle.style.transform = "translate(-50%, -50%) scale(1.25)";
  setTimeout(() => {
    circle.style.transform = "translate(-50%, -50%) scale(1)";
  }, 120);

  setTimeout(beatLoop, beatInterval);
}

/* CLICK TIMING */
window.addEventListener("click", () => {
  if (!gameRunning) return;

  let diff = Math.abs(Date.now() - lastBeatTime);

  if (diff < 130) {
    // HIT
    score++;
    circle.style.boxShadow = "0 0 30px lime";
  } else {
    // MISS
    score--;
    circle.style.boxShadow = "0 0 30px red";
  }

  updateScore();

  setTimeout(() => {
    circle.style.boxShadow = "0 0 20px rgba(255,255,255,0.4)";
  }, 120);
});

/* END GAME WHEN SONG ENDS */
audio.onended = () => {
  gameRunning = false;
};
</script>

</body>
</html>
