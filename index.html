<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beat Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: black;
}

/* Background FIXED */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover; /* THIS fixes stretching */
  z-index: -1;
}

/* Center circle */
#circle {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 120px;
  height: 120px;
  background: white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: box-shadow 0.2s, background 0.2s;
}

/* UI */
#ui {
  position: absolute;
  top: 20px;
  left: 20px;
  color: white;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

#leaderboard {
  position: absolute;
  right: 20px;
  top: 20px;
  color: white;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<img id="bg" src="background.jpg">

<div id="circle"></div>

<div id="ui">
  <button onclick="startGame()">Start</button>
  <button onclick="stopGame()">Stop</button>
  <button onclick="restartGame()">Restart</button>

  <div>Score: <span id="score">0</span></div>
  <div>Beat: "XoXo"</div>
  <div>Producer: CannaprizeBEATS</div>
</div>

<div id="leaderboard">Loading...</div>

<audio id="audio" src="beat.mp3"></audio>

<script>
let audio = document.getElementById("audio");
let circle = document.getElementById("circle");

let bpm = 167;
let beatInterval = 60000 / bpm;

let score = 0;
let lastBeatTime = 0;
let gameRunning = false;

function startGame() {
  audio.currentTime = 0;
  audio.play();
  score = 0;
  updateScore();
  gameRunning = true;

  beatLoop();
}

function stopGame() {
  audio.pause();
  gameRunning = false;
}

function restartGame() {
  stopGame();
  startGame();
}

function updateScore() {
  document.getElementById("score").innerText = score;
}

function beatLoop() {
  if (!gameRunning) return;

  lastBeatTime = Date.now();

  // pulse animation
  circle.style.background = "#aaa";
  setTimeout(() => {
    circle.style.background = "white";
  }, 100);

  setTimeout(beatLoop, beatInterval);
}

/* CLICK DETECTION */
window.addEventListener("click", () => {
  if (!gameRunning) return;

  let now = Date.now();
  let diff = Math.abs(now - lastBeatTime);

  if (diff < 120) {
    // HIT
    score++;
    circle.style.boxShadow = "0 0 30px green";
  } else {
    // MISS
    score--;
    circle.style.boxShadow = "0 0 30px red";
  }

  updateScore();

  setTimeout(() => {
    circle.style.boxShadow = "none";
  }, 150);
});

/* END GAME WHEN SONG ENDS */
audio.onended = () => {
  gameRunning = false;
  endGame();
};

function endGame() {
  let name = prompt("Enter your name:");
  if (!name) name = "Unknown Producer";

  saveScore(name, score);
}
</script>

  messagingSenderId: "866079824481",
  appId: "G-5X09NFW6FQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveScore = async function(name, score) {
  await addDoc(collection(db, "scores"), {
    name: name,
    score: score,
    time: Date.now()
  });
  loadLeaderboard();
};

window.loadLeaderboard = async function() {
  const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(10));
  const querySnapshot = await getDocs(q);

  const board = document.getElementById("leaderboard");
  board.innerHTML = "<b>Leaderboard</b><br>";

  querySnapshot.forEach(doc => {
    let data = doc.data();
    board.innerHTML += `${data.name}: ${data.score}<br>`;
  });
};

loadLeaderboard();
</script>

</body>
</html>
