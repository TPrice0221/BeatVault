<!DOCTYPE html>
<html>
<head>
  <title>On Beat Game</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    body {
  background: url('background.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
  text-align: center;
  font-family: Arial;
  touch-action: manipulation;
    }

    #circle {
      width: 150px;
      height: 150px;
      background: #111;
      border-radius: 50%;
      margin: 100px auto;
      position: relative;
      transition: background 0.15s, box-shadow 0.15s;
    }

    /* SOLID HIT / MISS FEEDBACK */
    #circle.hit {
      background: #00ff88;
      box-shadow: 0 0 25px #00ff88;
    }

    #circle.miss {
      background: #ff0033;
      box-shadow: 0 0 25px #ff0033;
    }

    /* Expanding wave */
    .wave {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      opacity: 0.8;
      pointer-events: none;
    }

    .wave.animate {
      animation: expand 0.7s linear;
    }

    @keyframes expand {
      0% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0.8;
      }
      100% {
        transform: translate(-50%, -50%) scale(2.8);
        opacity: 0;
      }
    }

    #score, #streak, #feedback {
      font-size: 20px;
      margin-top: 10px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Stay On Beat</h1>

<div id="circle"></div>

<div id="score">Score: 0</div>
<div id="streak">Streak: 0</div>
<div id="feedback">...</div>

<button onclick="startGame()">Start</button>

<audio id="beat" src="beat.mp3"></audio>

<script>
let bpm = 167;
let beatInterval = (60000 / bpm) * 2; // halftime

let lastBeatTime = 0;
let gameStarted = false;
let canHit = true;

let score = 0;
let streak = 0;

let perfectWindow = 120;
let goodWindow = 220;

function startGame() {
  if (gameStarted) return;
  gameStarted = true;

  let audio = document.getElementById("beat");
  audio.currentTime = 0;
  audio.play();

  runBeatLoop();
}

function runBeatLoop() {
  lastBeatTime = Date.now();
  canHit = true;

  spawnWave("white");

  setTimeout(runBeatLoop, beatInterval);
}

function spawnWave(color) {
  let circle = document.getElementById("circle");

  let wave = document.createElement("div");
  wave.classList.add("wave", "animate");
  wave.style.border = "3px solid " + color;

  circle.appendChild(wave);

  setTimeout(() => {
    wave.remove();
  }, 700);
}

function flashCircle(type) {
  let circle = document.getElementById("circle");

  circle.classList.remove("hit", "miss");
  circle.classList.add(type);

  setTimeout(() => {
    circle.classList.remove(type);
  }, 150);
}

function handleInput() {
  if (!gameStarted || !canHit) return;

  let now = Date.now();
  let diff = Math.abs(now - lastBeatTime);

  let feedback = document.getElementById("feedback");

  if (diff < perfectWindow) {
    score += 100;
    streak += 1;
    feedback.innerText = "Perfect";

    spawnWave("lime");
    flashCircle("hit");

  } else if (diff < goodWindow) {
    score += 50;
    streak += 1;
    feedback.innerText = "Good";

    spawnWave("lime");
    flashCircle("hit");

  } else {
    streak = 0;
    feedback.innerText = "Miss";

    spawnWave("red");
    flashCircle("miss");
  }

  canHit = false;

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("streak").innerText = "Streak: " + streak;
}

document.addEventListener("click", handleInput);
document.addEventListener("touchstart", handleInput);
</script>

</body>
</html>
